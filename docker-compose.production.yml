services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  auto_runner:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "services.auto_runner", "--watch"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "python",
        "-m",
        "streamlit",
        "run",
        "dashboard/streamlit_app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--server.headless=true"
      ]
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
