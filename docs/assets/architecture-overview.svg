  <text x="746" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">History attach</text>
  <text x="746" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">Alert attach</text>
  <text x="746" y="248" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">Artifacts / harness / persistence</text>

