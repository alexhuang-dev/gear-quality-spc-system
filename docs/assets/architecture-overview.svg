  <text x="248" y="628" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Visual workflow / demo layer</text>
  <text x="248" y="650" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Calls backend API only</text>

  <rect x="620" y="560" width="280" height="120" rx="8" fill="#eff6ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="648" y="600" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0369a1">Streamlit Dashboard</text>
  <text x="648" y="628" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Operational visibility</text>
  <text x="648" y="650" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Recent runs / trends / alerts</text>

