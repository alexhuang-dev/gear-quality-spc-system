  </text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="60" y="150" width="220" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="86" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">Input Layer</text>
  <text x="86" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">CSV text / CSV file</text>
  <text x="86" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">Spec overrides / runtime config</text>

  <rect x="340" y="130" width="320" height="140" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
