  <line x1="660" y1="198" x2="720" y2="198" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="960" y1="198" x2="1020" y2="198" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="840" y1="270" x2="840" y2="340" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="520" y1="270" x2="520" y2="340" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="760" y1="270" x2="760" y2="340" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1070" y1="270" x2="1070" y2="340" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="520" y1="480" x2="520" y2="520" stroke="#64748b" stroke-width="3"/>
  <line x1="520" y1="520" x2="360" y2="520" stroke="#64748b" stroke-width="3"/>
  <line x1="360" y1="520" x2="360" y2="560" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="800" y1="480" x2="800" y2="560" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="60" y="730" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">
    Principle: Deterministic facts are computed by code; language layers explain but do not own the truth.
  </text>
