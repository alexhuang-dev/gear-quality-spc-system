  <text x="366" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">CSV parsing</text>
  <text x="366" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">SPC metrics / Cp / Cpk / limits</text>
  <text x="366" y="248" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">Western Electric rules</text>

