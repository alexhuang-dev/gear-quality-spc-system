  <text x="986" y="428" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Webhook payloads</text>
  <text x="986" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">WeCom / Feishu / generic</text>

  <rect x="220" y="560" width="280" height="120" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
