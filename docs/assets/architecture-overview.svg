<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="60" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">
    Gear Quality SPC System
  </text>
  <text x="60" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">
