  <text x="1046" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">/history /report /ready</text>
  <text x="1046" y="248" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1e293b">/dashboard /regression</text>

